<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SeAuto — Prototipo</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{font-family:'IBM Plex Sans',sans-serif;background:#d8e4f0}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#b0c0d4;border-radius:3px}
input,select,textarea,button{font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>

<!-- ═══════════════════════════════════════════════ CLIENT APP ═══ -->
<script type="text/babel">
const C_VEHICLES = [
  {id:1,placa:'ABJ-1583',marca:'BYD',modelo:'Yuan Pro',año:2026,color:'Azul',
   status:'En reparación',ticket:'TK-2026-0023',tecnico:'Carlos Mendoza',ingreso:'11/01/26',
   trabajos:['Puerta pos RH','Retrovisor RH','Guardafango del LH','Punta del LH','Moldura rueda post LH']},
  {id:2,placa:'PCG-4421',marca:'Toyota',modelo:'Corolla',año:2022,color:'Blanco',
   status:'Listo para entrega',ticket:'TK-2026-0018',tecnico:'Ana Torres',ingreso:'05/01/26',
   trabajos:['Revisión de frenos','Cambio de aceite y filtro']},
];
const C_PROMOS = [
  {id:1,title:'20% en alineación y balanceo',desc:'Válido hasta 28 Feb 2026',claimed:false},
  {id:2,title:'Diagnóstico gratuito',desc:'Para vehículos nuevos ingresados',claimed:true},
  {id:3,title:'3x2 en cambios de aceite',desc:'Hasta agotar stock',claimed:false},
];
const STS = {
  received: {label:'Recibido',c:'#64748b',bg:'#f1f5f9'},
  diagnosis:{label:'En diagnóstico',c:'#2563eb',bg:'#eff6ff'},
  repair:   {label:'En reparación',c:'#ea580c',bg:'#fff7ed'},
  ready:    {label:'Listo para entrega',c:'#16a34a',bg:'#f0fdf4'},
  delivered:{label:'Entregado',c:'#15803d',bg:'#dcfce7'},
};
const STEPS = ['Recibido','Diagnóstico','Reparación','Listo','Entregado'];
const STKEYS = ['received','diagnosis','repair','ready','delivered'];

const Bdg = ({s}) => <span style={{fontSize:11,fontWeight:600,padding:'3px 8px',borderRadius:4,color:'#1d4ed8',background:'#eff6ff',whiteSpace:'nowrap'}}>{s}</span>;
const CHeader = ({title,onBack}) => (
  <div style={{background:'#1e3a5f',color:'white',padding:'10px 16px',display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
    {onBack && <button onClick={onBack} style={{background:'none',border:'none',color:'white',fontSize:18,cursor:'pointer',lineHeight:1,padding:0}}>←</button>}
    <div><div style={{fontSize:9,opacity:.6,letterSpacing:1,textTransform:'uppercase'}}>SeAuto</div><div style={{fontSize:15,fontWeight:700}}>{title}</div></div>
  </div>
);
const inp = {width:'100%',padding:'9px 12px',border:'1px solid #e2e8f0',borderRadius:6,fontSize:13,boxSizing:'border-box'};
const lbl = {fontSize:11,fontWeight:600,color:'#475569',display:'block',marginBottom:3};

const LoginScreen = ({onLogin,isReg,toggle}) => {
  const [f,sf] = React.useState({email:'',pwd:'',name:'',phone:''});
  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24,background:'#f8fafc'}}>
      <div style={{textAlign:'center',marginBottom:24}}>
        <div style={{width:52,height:52,background:'#1e3a5f',borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 10px',fontSize:26}}>🚗</div>
        <div style={{fontSize:22,fontWeight:800,color:'#1e3a5f',letterSpacing:'-0.5px'}}>SeAuto</div>
        <div style={{fontSize:11,color:'#64748b'}}>Portal de clientes</div>
      </div>
      <div style={{background:'white',borderRadius:12,padding:20,width:'100%',boxShadow:'0 2px 12px rgba(0,0,0,.08)'}}>
        <div style={{fontSize:14,fontWeight:700,color:'#1e293b',marginBottom:16}}>{isReg?'Crear cuenta':'Iniciar sesión'}</div>
        {isReg && <>
          <div style={{marginBottom:10}}><label style={lbl}>Nombre completo</label><input style={inp} value={f.name} onChange={e=>sf({...f,name:e.target.value})} placeholder="Juan Pérez"/></div>
          <div style={{marginBottom:10}}><label style={lbl}>Teléfono</label><input style={inp} value={f.phone} onChange={e=>sf({...f,phone:e.target.value})} placeholder="0991234567"/></div>
        </>}
        <div style={{marginBottom:10}}><label style={lbl}>Correo electrónico</label><input style={inp} value={f.email} onChange={e=>sf({...f,email:e.target.value})} placeholder="correo@email.com" type="email"/></div>
        <div style={{marginBottom:18}}><label style={lbl}>Contraseña</label><input style={inp} value={f.pwd} onChange={e=>sf({...f,pwd:e.target.value})} placeholder="••••••••" type="password"/></div>
        <button onClick={onLogin} style={{width:'100%',background:'#1d4ed8',color:'white',border:'none',borderRadius:8,padding:11,fontSize:14,fontWeight:700,cursor:'pointer'}}>{isReg?'Registrarme':'Entrar'}</button>
        <div style={{textAlign:'center',marginTop:14,fontSize:12,color:'#64748b'}}>
          {isReg?'¿Ya tienes cuenta? ':'¿No tienes cuenta? '}
          <span onClick={toggle} style={{color:'#2563eb',cursor:'pointer',fontWeight:600}}>{isReg?'Iniciar sesión':'Regístrate'}</span>
        </div>
      </div>
    </div>
  );
};

const HomeScreen = ({vehicles,onSelect}) => (
  <div style={{flex:1,overflowY:'auto'}}>
    <CHeader title="Mis Vehículos"/>
    <div style={{padding:14}}>
      <div style={{fontSize:12,color:'#64748b',marginBottom:12}}>Toca un vehículo para ver el estado</div>
      {vehicles.map(v => (
        <div key={v.id} onClick={()=>onSelect(v)} style={{background:'white',borderRadius:10,padding:14,marginBottom:10,boxShadow:'0 1px 4px rgba(0,0,0,.07)',cursor:'pointer',borderLeft:'3px solid #2563eb'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
            <div>
              <div style={{fontSize:14,fontWeight:700,color:'#1e293b'}}>{v.marca} {v.modelo}</div>
              <div style={{fontSize:11,color:'#64748b',marginTop:2}}>Placa: {v.placa} · {v.año} · {v.color}</div>
              <div style={{fontSize:11,color:'#94a3b8'}}>Ticket: {v.ticket}</div>
            </div>
            <Bdg s={v.status}/>
          </div>
          <div style={{fontSize:11,color:'#64748b',display:'flex',alignItems:'center',gap:5}}>
            <div style={{width:5,height:5,borderRadius:'50%',background:'#2563eb',flexShrink:0}}/>
            Técnico: {v.tecnico} · Ingreso: {v.ingreso}
          </div>
        </div>
      ))}
    </div>
  </div>
);

const VehicleDetail = ({v,onBack}) => (
    <div style={{flex:1,overflowY:'auto',background:'#f8fafc'}}>
      <CHeader title={`${v.marca} ${v.modelo}`} onBack={onBack}/>
      <div style={{padding:14}}>
        <div style={{background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:9,padding:16,marginBottom:12}}>
          <div style={{fontSize:9,fontWeight:700,color:'#3b82f6',textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>Estado actual</div>
          <div style={{fontSize:18,fontWeight:800,color:'#1e3a5f',marginBottom:4}}>{v.status}</div>
          <div style={{fontSize:11,color:'#64748b'}}>Ticket {v.ticket} · Técnico: {v.tecnico}</div>
        </div>
        <div style={{background:'white',borderRadius:10,padding:14,marginBottom:12,boxShadow:'0 1px 3px rgba(0,0,0,.06)'}}>
          <div style={{fontSize:10,fontWeight:700,color:'#1e293b',marginBottom:10,textTransform:'uppercase',letterSpacing:.5}}>Datos del vehículo</div>
          {[['Placa',v.placa],['Marca / Modelo',`${v.marca} ${v.modelo}`],['Año',v.año],['Color',v.color],['Fecha ingreso',v.ingreso],['Técnico asignado',v.tecnico]].map(([k,val])=>(
            <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid #f1f5f9',fontSize:12}}>
              <span style={{color:'#64748b'}}>{k}</span><span style={{fontWeight:600,color:'#1e293b'}}>{val}</span>
            </div>
          ))}
        </div>
        <div style={{background:'white',borderRadius:10,padding:14,boxShadow:'0 1px 3px rgba(0,0,0,.06)'}}>
          <div style={{fontSize:10,fontWeight:700,color:'#1e293b',marginBottom:10,textTransform:'uppercase',letterSpacing:.5}}>Trabajos registrados</div>
          {v.trabajos.map((t,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 0',borderBottom:'1px solid #f8fafc',fontSize:12,color:'#374151'}}>
              <div style={{width:5,height:5,borderRadius:'50%',background:'#2563eb',flexShrink:0}}/>{t}
            </div>
          ))}
        </div>
      </div>
    </div>
);

const SiniestroScreen = () => {
  const [d,sd]=React.useState({placa:'',desc:'',seguro:'Sin seguro'});
  const [photos,sp]=React.useState([]);
  const [ok,sok]=React.useState(false);
  if(ok) return (
    <div style={{flex:1,display:'flex',flexDirection:'column'}}>
      <CHeader title="Reportar Siniestro"/>
      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24,textAlign:'center'}}>
        <div style={{fontSize:44,marginBottom:12}}>✅</div>
        <div style={{fontSize:15,fontWeight:700,color:'#16a34a',marginBottom:6}}>¡Solicitud enviada!</div>
        <div style={{fontSize:12,color:'#64748b',marginBottom:20}}>Un técnico revisará las fotos y te enviará la valorización en breve.</div>
        <button onClick={()=>{sok(false);sd({placa:'',desc:'',seguro:'Sin seguro'});sp([]);}} style={{background:'#1d4ed8',color:'white',border:'none',borderRadius:8,padding:'9px 24px',fontSize:13,fontWeight:600,cursor:'pointer'}}>Nueva solicitud</button>
      </div>
    </div>
  );
  return (
    <div style={{flex:1,overflowY:'auto'}}>
      <CHeader title="Reportar Siniestro"/>
      <div style={{padding:14}}>
        <div style={{background:'#fff7ed',border:'1px solid #fed7aa',borderRadius:7,padding:10,marginBottom:14,fontSize:11,color:'#9a3412'}}>📷 Adjunta fotos del daño desde varios ángulos para una valorización precisa.</div>
        <div style={{background:'white',borderRadius:10,padding:14,marginBottom:12,boxShadow:'0 1px 3px rgba(0,0,0,.06)'}}>
          <div style={{marginBottom:10}}><label style={lbl}>Placa del vehículo</label><input style={inp} value={d.placa} onChange={e=>sd({...d,placa:e.target.value})} placeholder="Ej. ABJ-1583"/></div>
          <div style={{marginBottom:10}}><label style={lbl}>Descripción del daño</label><textarea style={{...inp,resize:'vertical',minHeight:72}} value={d.desc} onChange={e=>sd({...d,desc:e.target.value})} placeholder="Describe el daño o incidente..."/></div>
          <div><label style={lbl}>Seguro / Broker</label>
            <select style={inp} value={d.seguro} onChange={e=>sd({...d,seguro:e.target.value})}>
              {['Sin seguro','TP Seguros','AIG Ecuador','Seguros Equinoccial'].map(x=><option key={x}>{x}</option>)}
            </select>
          </div>
        </div>
        <div style={{background:'white',borderRadius:10,padding:14,marginBottom:14,boxShadow:'0 1px 3px rgba(0,0,0,.06)'}}>
          <div style={{fontSize:10,fontWeight:700,color:'#1e293b',marginBottom:10,textTransform:'uppercase',letterSpacing:.5}}>Fotos del daño</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
            {photos.map((p,i)=>(
              <div key={p} style={{aspectRatio:'1',background:'#e2e8f0',borderRadius:7,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'#64748b',flexDirection:'column',gap:4}}>
                <span style={{fontSize:18}}>📷</span>Foto {i+1}
              </div>
            ))}
            <div onClick={()=>sp([...photos,Date.now()])} style={{aspectRatio:'1',border:'2px dashed #cbd5e1',borderRadius:7,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'#94a3b8',gap:2}}>
              <span style={{fontSize:18}}>+</span><span style={{fontSize:9}}>Agregar</span>
            </div>
          </div>
        </div>
        <button onClick={()=>sok(true)} style={{width:'100%',background:'#1d4ed8',color:'white',border:'none',borderRadius:8,padding:12,fontSize:14,fontWeight:700,cursor:'pointer'}}>Enviar para valorización</button>
      </div>
    </div>
  );
};

const PromosScreen = () => {
  const [pr,spr]=React.useState(C_PROMOS);
  return (
    <div style={{flex:1,overflowY:'auto'}}>
      <CHeader title="Promociones"/>
      <div style={{padding:14}}>
        {pr.map(p=>(
          <div key={p.id} style={{background:'white',borderRadius:10,padding:14,marginBottom:10,boxShadow:'0 1px 3px rgba(0,0,0,.06)',opacity:p.claimed?.8:1}}>
            <div style={{fontSize:14,fontWeight:700,color:'#1e293b',marginBottom:3}}>{p.title}</div>
            <div style={{fontSize:11,color:'#64748b',marginBottom:10}}>{p.desc}</div>
            {p.claimed
              ? <div style={{fontSize:11,color:'#16a34a',fontWeight:600,background:'#f0fdf4',padding:'5px 10px',borderRadius:5,display:'inline-block'}}>✓ Canjeada</div>
              : <button onClick={()=>spr(pr.map(x=>x.id===p.id?{...x,claimed:true}:x))} style={{background:'#1d4ed8',color:'white',border:'none',borderRadius:6,padding:'7px 14px',fontSize:12,fontWeight:600,cursor:'pointer'}}>Reclamar promoción</button>
            }
          </div>
        ))}
      </div>
    </div>
  );
};

const CuponesScreen = () => {
  const [code,sc]=React.useState('');
  const [st,ss]=React.useState(null);
  return (
    <div style={{flex:1,overflowY:'auto'}}>
      <CHeader title="Cupones"/>
      <div style={{padding:14}}>
        <div style={{background:'white',borderRadius:10,padding:18,marginBottom:12,boxShadow:'0 1px 3px rgba(0,0,0,.06)'}}>
          <div style={{fontSize:13,fontWeight:700,color:'#1e293b',marginBottom:4}}>Canjear código</div>
          <div style={{fontSize:11,color:'#64748b',marginBottom:14}}>Ingresa el código para aplicar tu descuento.</div>
          <input value={code} onChange={e=>{sc(e.target.value.toUpperCase());ss(null);}} placeholder="Ej. SEAUTO10"
            style={{width:'100%',padding:'11px',border:`2px solid ${st==='ok'?'#16a34a':st==='err'?'#dc2626':'#e2e8f0'}`,borderRadius:7,fontSize:15,fontWeight:700,letterSpacing:2,textAlign:'center',boxSizing:'border-box',fontFamily:'monospace'}}/>
          {st==='ok'&&<div style={{marginTop:6,color:'#16a34a',fontSize:12,fontWeight:600}}>✓ Cupón válido — descuento aplicado</div>}
          {st==='err'&&<div style={{marginTop:6,color:'#dc2626',fontSize:12,fontWeight:600}}>✗ Código inválido o expirado</div>}
          <button onClick={()=>ss(['SEAUTO10','BIENVENIDO20','VERANO15'].includes(code)?'ok':'err')}
            style={{width:'100%',marginTop:12,background:'#1d4ed8',color:'white',border:'none',borderRadius:7,padding:11,fontSize:13,fontWeight:700,cursor:'pointer'}}>Validar cupón</button>
        </div>
        <div style={{background:'white',borderRadius:10,padding:14,boxShadow:'0 1px 3px rgba(0,0,0,.06)'}}>
          <div style={{fontSize:10,fontWeight:700,color:'#1e293b',marginBottom:10,textTransform:'uppercase',letterSpacing:.5}}>Cupones activos</div>
          {[{code:'BIENVENIDO20',desc:'20% descuento primer servicio',vence:'30/03/26'},{code:'VERANO15',desc:'15% en servicios de temporada',vence:'28/02/26'}].map(c=>(
            <div key={c.code} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid #f1f5f9'}}>
              <div><div style={{fontSize:12,fontWeight:700,color:'#1e3a5f',fontFamily:'monospace'}}>{c.code}</div><div style={{fontSize:11,color:'#64748b'}}>{c.desc}</div></div>
              <div style={{fontSize:10,color:'#ea580c',fontWeight:600}}>Vence {c.vence}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

const ContactoScreen = () => (
  <div style={{flex:1,overflowY:'auto'}}>
    <CHeader title="Contacto"/>
    <div style={{padding:14}}>
      <div style={{background:'white',borderRadius:10,padding:14,marginBottom:12,boxShadow:'0 1px 3px rgba(0,0,0,.06)'}}>
        <div style={{fontSize:13,fontWeight:700,color:'#1e293b',marginBottom:12}}>Atención al cliente</div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <div style={{display:'flex',alignItems:'center',gap:12,background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:8,padding:12,cursor:'pointer'}}>
            <div style={{width:34,height:34,background:'#16a34a',borderRadius:7,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>💬</div>
            <div><div style={{fontSize:13,fontWeight:700,color:'#15803d'}}>WhatsApp</div><div style={{fontSize:11,color:'#64748b'}}>+593 99 123 4567</div></div>
          </div>
          {[['📞','Teléfono','(02) 345-6789'],['📧','Correo','info@seauto.com.ec'],['📍','Dirección','Av. 10 de Agosto N23-45, Quito']].map(([ic,lb,val])=>(
            <div key={lb} style={{display:'flex',alignItems:'center',gap:12,background:'#f8fafc',borderRadius:8,padding:12}}>
              <div style={{fontSize:18,width:34,textAlign:'center'}}>{ic}</div>
              <div><div style={{fontSize:12,fontWeight:600,color:'#1e293b'}}>{lb}</div><div style={{fontSize:11,color:'#64748b'}}>{val}</div></div>
            </div>
          ))}
        </div>
      </div>
      <div style={{background:'white',borderRadius:10,padding:14,boxShadow:'0 1px 3px rgba(0,0,0,.06)'}}>
        <div style={{fontSize:10,fontWeight:700,color:'#1e293b',marginBottom:10,textTransform:'uppercase',letterSpacing:.5}}>Redes sociales</div>
        <div style={{display:'flex',gap:10}}>
          {[['Facebook','#1877f2'],['Instagram','#e4405f'],['YouTube','#ff0000']].map(([lb,col])=>(
            <div key={lb} style={{flex:1,background:col+'18',borderRadius:7,padding:'10px 4px',textAlign:'center',cursor:'pointer'}}>
              <div style={{fontSize:11,fontWeight:700,color:col}}>{lb}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  </div>
);

const BottomNav = ({tab,onChange}) => {
  const tabs=[['home','🏠','Inicio'],['siniestro','📸','Siniestro'],['promos','🏷','Promos'],['cupones','🎟','Cupones'],['contacto','📞','Contacto']];
  return (
    <div style={{background:'white',borderTop:'1px solid #e2e8f0',display:'flex',flexShrink:0}}>
      {tabs.map(([id,ic,lb])=>(
        <button key={id} onClick={()=>onChange(id)} style={{flex:1,border:'none',background:'none',padding:'7px 0',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
          <span style={{fontSize:17}}>{ic}</span>
          <span style={{fontSize:9,fontWeight:tab===id?700:400,color:tab===id?'#1d4ed8':'#94a3b8'}}>{lb}</span>
        </button>
      ))}
    </div>
  );
};

const ClientApp = () => {
  const [loggedIn,sli]=React.useState(false);
  const [isReg,sir]=React.useState(false);
  const [tab,st]=React.useState('home');
  const [sel,ss]=React.useState(null);
  if(!loggedIn) return (
    <div style={{flex:1,display:'flex',flexDirection:'column',overflowY:'auto'}}>
      <LoginScreen onLogin={()=>sli(true)} isReg={isReg} toggle={()=>sir(!isReg)}/>
    </div>
  );
  if(sel&&tab==='home') return (
    <div style={{flex:1,display:'flex',flexDirection:'column',overflowY:'hidden'}}>
      <VehicleDetail v={sel} onBack={()=>ss(null)}/>
      <BottomNav tab={tab} onChange={t=>{st(t);ss(null);}}/>
    </div>
  );
  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      {tab==='home'&&<HomeScreen vehicles={C_VEHICLES} onSelect={ss}/>}
      {tab==='siniestro'&&<SiniestroScreen/>}
      {tab==='promos'&&<PromosScreen/>}
      {tab==='cupones'&&<CuponesScreen/>}
      {tab==='contacto'&&<ContactoScreen/>}
      <BottomNav tab={tab} onChange={t=>{st(t);ss(null);}}/>
    </div>
  );
};
window.ClientApp = ClientApp;
</script>

<!-- ═══════════════════════════════════════════════ ADMIN APP ═══ -->
<script type="text/babel">

  {id:1,ticket:'TK-2026-0023',placa:'ABJ-1583',cliente:'Grey Pullice',marca:'BYD',modelo:'Yuan Pro',año:2026,color:'Azul',tecnico:'Carlos Mendoza',status:'En reparación',ingreso:'11/01/26',seguro:'TP',broker:'TP Seguros'},

  const toggle=id=>sts(ts.map(t=>t.id===id?{...t,ok:!t.ok}:t));
  const s=WTS[job.status]||{label:job.status,c:'#64748b',bg:'#f1f5f9'};
  const done=ts.filter(t=>t.ok).length;
  return (
    <div>
      <MHdr title={job.ticket} sub="Detalle trabajo" onBack={onBack}/>
      <div style={{padding:14}}>
        <div style={{background:'white',borderRadius:9,padding:14,marginBottom:12,boxShadow:'0 1px 3px rgba(0,0,0,.06)'}}>
          <div style={{marginBottom:8}}>
            {[['Placa',job.placa],['Vehículo',`${job.marca} ${job.modelo}`],['Cliente',job.cliente],['Seguro',job.seguro||'Sin seguro'],['Ingreso',job.ingreso]].map(([k,v])=>(
              <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid #f1f5f9',fontSize:12}}>
                <span style={{color:'#64748b'}}>{k}</span><span style={{fontWeight:600,color:'#1e293b'}}>{v}</span>
              </div>
            ))}
          </div>
          <span style={{fontSize:10,fontWeight:600,padding:'3px 8px',borderRadius:4,color:s.c,background:s.bg}}>{s.label}</span>
        </div>
        <div style={{background:'white',borderRadius:9,padding:14,marginBottom:12,boxShadow:'0 1px 3px rgba(0,0,0,.06)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <div style={{fontSize:11,fontWeight:700,color:'#1e293b',textTransform:'uppercase',letterSpacing:.5}}>Lista de trabajos</div>
            <div style={{fontSize:11,color:'#64748b'}}>{done}/{ts.length} listos</div>
          </div>
          <div style={{height:3,background:'#e2e8f0',borderRadius:2,marginBottom:12}}>
            <div style={{height:'100%',width:`${ts.length>0?(done/ts.length)*100:0}%`,background:'#16a34a',borderRadius:2,transition:'width .3s'}}/>
          </div>
          {ts.map(t=>(
            <div key={t.id} onClick={()=>toggle(t.id)} style={{display:'flex',gap:10,alignItems:'center',padding:'9px 0',borderBottom:'1px solid #f8fafc',cursor:'pointer'}}>
              <div style={{width:20,height:20,borderRadius:5,border:`2px solid ${t.ok?'#16a34a':'#e2e8f0'}`,background:t.ok?'#16a34a':'white',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,color:'white',fontSize:11,fontWeight:700}}>{t.ok?'✓':''}</div>
              <span style={{fontSize:13,color:t.ok?'#16a34a':'#1e293b',textDecoration:t.ok?'line-through':'none'}}>{t.t}</span>
            </div>
          ))}
        </div>
        <button onClick={()=>alert('Marcado como listo para entrega')} style={{width:'100%',background:'#16a34a',color:'white',border:'none',borderRadius:8,padding:12,fontSize:13,fontWeight:700,cursor:'pointer'}}>
          ✓ Marcar como listo para entrega
        </button>
      </div>
    </div>
  );
};

const TM_Sin = () => {

        <div style={{background:'white',borderRadius:9,padding:14,marginBottom:12,boxShadow:'0 1px 3px rgba(0,0,0,.06)'}}>

            <div onClick={()=>sp([...photos,{id:Date.now(),lb:'Foto '+(photos.length+1)}])} style={{aspectRatio:'1',border:'2px dashed #cbd5e1',borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'#94a3b8',fontSize:12}}>+</div>

          {items.map((it,i)=>(
            <div key={it.id} style={{marginBottom:10,paddingBottom:10,borderBottom:'1px solid #f1f5f9'}}>

                <input value={it.desc} onChange={e=>upd(it.id,'desc',e.target.value)} style={{...minp,flex:1,padding:'7px 9px'}} placeholder="Descripción"/>
                <input type="number" value={it.precio||''} onChange={e=>upd(it.id,'precio',e.target.value)} style={{...minp,width:68,padding:'7px 8px',textAlign:'right'}} placeholder="$"/>
              </div>
              <div style={{paddingLeft:20}}>
                <select value={it.tipo} onChange={e=>upd(it.id,'tipo',e.target.value)} style={{...minp,padding:'6px 8px'}}>
                  {['Pintura','Enderezado','Cambio pieza','Mecánica','Otro'].map(t=><option key={t}>{t}</option>)}
                </select>
              </div>
            </div>
          ))}
          <button onClick={()=>si([...items,{id:Date.now(),desc:'',tipo:'Pintura',precio:0}])} style={{background:'none',border:'1px dashed #cbd5e1',borderRadius:5,padding:'5px',fontSize:11,cursor:'pointer',color:'#64748b',width:'100%',marginBottom:10}}>+ Agregar ítem</button>
          <div style={{borderTop:'2px solid #e2e8f0',paddingTop:8}}>
            {[['Subtotal',sub],['IVA 15%',sub*.15],['Total',sub*1.15]].map(([lb,val])=>(
              <div key={lb} style={{display:'flex',justifyContent:'space-between',padding:'3px 0',fontSize:12}}>
                <span style={{color:'#64748b',fontWeight:lb==='Total'?700:400}}>{lb}</span>
                <span style={{fontWeight:lb==='Total'?800:400,color:lb==='Total'?'#1e3a5f':'#374151'}}>${val.toFixed(2)}</span>
              </div>
            ))}
          </div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button style={{flex:1,background:'white',color:'#374151',border:'1px solid #e2e8f0',borderRadius:7,padding:11,fontSize:12,fontWeight:600,cursor:'pointer'}}>Borrador</button>
          <button style={{flex:1,background:'#1d4ed8',color:'white',border:'none',borderRadius:7,padding:11,fontSize:12,fontWeight:700,cursor:'pointer'}}>Enviar</button>
        </div>
      </div>

  );
};

<!-- ═══════════════════════════════════════════════ MAIN APP ═══ -->
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primaryColor": "#fafafa",
  "sidebarColor": "#1e3a5f",
  "accentColor": "#ea580c"
}/*EDITMODE-END*/;

const RoleBar = ({role,setRole,platform,setPlatform}) => (
  <div style={{background:'#0f2040',padding:'7px 20px',display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
    <div style={{color:'white',fontWeight:800,fontSize:14,letterSpacing:'-0.3px',marginRight:4}}>SeAuto <span style={{fontWeight:400,fontSize:11,color:'rgba(255,255,255,.4)',letterSpacing:0}}>Prototipo</span></div>
    <div style={{display:'flex',gap:3}}>
      {[['cliente','📱 Cliente'],['admin','🖥 Admin'],['tecnico','🔧 Técnico']].map(([r,lb])=>(
        <button key={r} onClick={()=>setRole(r)} style={{padding:'5px 13px',borderRadius:6,border:'none',cursor:'pointer',fontSize:12,fontWeight:600,background:role===r?'#2563eb':'rgba(255,255,255,.1)',color:role===r?'white':'rgba(255,255,255,.6)',transition:'all .15s'}}>
          {lb}
        </button>
      ))}
    </div>
    {role !== 'cliente' && (
      <div style={{display:'flex',gap:2,background:'rgba(255,255,255,.08)',borderRadius:7,padding:3,marginLeft:4}}>
        {[['web','🖥 Web'],['mobile','📱 Móvil']].map(([p,lb])=>(
          <button key={p} onClick={()=>setPlatform(p)} style={{padding:'4px 11px',borderRadius:5,border:'none',cursor:'pointer',fontSize:11,fontWeight:600,background:platform===p?'white':'transparent',color:platform===p?'#1e3a5f':'rgba(255,255,255,.55)',transition:'all .15s'}}>
            {lb}
          </button>
        ))}
      </div>
    )}
    <div style={{marginLeft:'auto',fontSize:10,color:'rgba(255,255,255,.3)'}}>Abril 2026</div>
  </div>
);

const TweaksPanel = ({visible}) => {
  const [cfg,sc]=React.useState(TWEAK_DEFAULTS);
  if(!visible) return null;
  return (
    <div style={{position:'fixed',bottom:20,right:20,zIndex:9999,background:'white',borderRadius:10,padding:16,boxShadow:'0 8px 32px rgba(0,0,0,.15)',width:220,border:'1px solid #e2e8f0'}}>
      <div style={{fontSize:12,fontWeight:700,color:'#1e293b',marginBottom:12}}>Tweaks</div>
      {[['primaryColor','Color primario'],['sidebarColor','Color sidebar'],['accentColor','Color acento']].map(([k,lb])=>(
        <div key={k} style={{marginBottom:10}}>
          <div style={{fontSize:11,color:'#64748b',marginBottom:4}}>{lb}</div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <input type="color" value={cfg[k]} onChange={e=>{const nc={...cfg,[k]:e.target.value};sc(nc);window.parent.postMessage({type:'__edit_mode_set_keys',edits:nc},'*');}}
              style={{width:32,height:28,border:'1px solid #e2e8f0',borderRadius:4,cursor:'pointer',padding:2}}/>
            <span style={{fontSize:11,fontFamily:'monospace',color:'#374151'}}>{cfg[k]}</span>
          </div>
        </div>
      ))}
    </div>
  );
};

const PhoneShell = ({children}) => (
  <div style={{width:380,height:'min(720px, calc(100vh - 60px))',background:'white',borderRadius:28,overflow:'hidden',boxShadow:'0 24px 64px rgba(0,0,0,.22)',display:'flex',flexDirection:'column',border:'7px solid #1e293b'}}>
    <div style={{background:'#1e3a5f',padding:'6px 22px',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
      <span style={{color:'white',fontSize:11,fontWeight:600}}>9:41</span>
      <span style={{color:'white',fontSize:10,letterSpacing:1}}>▲▲▲ ■</span>
    </div>
    {children}
  </div>
);

const App = () => {
  const [role,sr]=React.useState(()=>localStorage.getItem('seauto_role')||'cliente');
  const [platform,sp]=React.useState(()=>localStorage.getItem('seauto_platform')||'web');
  const [tweaks,st]=React.useState(false);
  const setRole=(r)=>{sr(r);localStorage.setItem('seauto_role',r);};
  const setPlatform=(p)=>{sp(p);localStorage.setItem('seauto_platform',p);};

  React.useEffect(()=>{
    const handler=(e)=>{
      if(e.data?.type==='__activate_edit_mode') st(true);
      if(e.data?.type==='__deactivate_edit_mode') st(false);
    };
    window.addEventListener('message',handler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return ()=>window.removeEventListener('message',handler);
  },[]);

  const ClientC=window.ClientApp, AdminC=window.AdminApp, TechC=window.TecnicoApp;
  const AdminMC=window.AdminMobileApp, TechMC=window.TecnicoMobileApp;
  const isMobile = platform==='mobile';
  const showPhone = role==='cliente' || isMobile;
  const h='calc(100vh - 38px)';

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>
      <RoleBar role={role} setRole={setRole} platform={platform} setPlatform={setPlatform}/>
      <div style={{height:h,overflow:'hidden',display:'flex',alignItems:showPhone?'center':'stretch',justifyContent:showPhone?'center':'stretch',background:showPhone?'#d8e4f0':'#f8fafc'}}>
        {role==='cliente'&&(
          <PhoneShell><ClientC/></PhoneShell>
        )}
        {role==='admin'&&!isMobile&&<div style={{width:'100%',height:'100%'}}><AdminC/></div>}
        {role==='admin'&&isMobile&&(
          <PhoneShell><AdminMC/></PhoneShell>
        )}
        {role==='tecnico'&&!isMobile&&<div style={{width:'100%',height:'100%'}}><TechC/></div>}
        {role==='tecnico'&&isMobile&&(
          <PhoneShell><TechMC/></PhoneShell>
        )}
      </div>
      <TweaksPanel visible={tweaks}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
